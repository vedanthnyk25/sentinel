version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/queries"
    schema: "sql/migrations"
    gen:
      go:
        package: "database"
        out: "internal/platform/database"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true 
        emit_exact_table_names: false
        overrides:
          - db_type: uuid
            go_type: github.com/google/uuid.UUID
